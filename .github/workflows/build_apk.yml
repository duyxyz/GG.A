name: Flutter Build APK

on:
  workflow_dispatch: # Chỉ chạy thủ công khi bạn tự bấm nút trên GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # Quan trọng: Cho phép Action tạo Release và đẩy file lên

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Build APK (Split per ABI)
        run: |
          # Tính toán build number từ run_number của GitHub
          # Giả sử bắt đầu từ 1.0.0, mỗi lần build sẽ tăng version: 1.0.<run_number>
          BUILD_NAME="1.0.${{ github.run_number }}"
          BUILD_NUMBER="${{ github.run_number }}"
          flutter build apk --release --split-per-abi \
            --target-platform android-arm,android-arm64 \
            --build-name=$BUILD_NAME \
            --build-number=$BUILD_NUMBER \
            --dart-define=GH_TOKEN=${{ secrets.GH_TOKEN }}

      - name: Generate Release Tag
        id: tag
        run: echo "tag_name=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Get Commits
        id: commits
        run: |
          # Lấy 5 commit mới nhất hoặc kể từ tag trước (nếu có)
          COMMITS=$(git log -n 5 --pretty=format:"• %s")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release and Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Release ${{ steps.tag.outputs.tag_name }}
          body: ${{ steps.commits.outputs.changelog }}
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}